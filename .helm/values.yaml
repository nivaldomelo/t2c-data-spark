# Defaults estáticos. Per-env via CI: --set image.tag={env}-{sha}, --set config.X, -f secret-values.yaml.
appName: t2c-data-spark

image:
  repository: ""          # ECR (via --set image.repository)
  tag: ""                 # {env}-{git-sha} (via --set image.tag)
  pullPolicy: IfNotPresent

master:
  webUiPort: 8080
  rpcPort: 7077
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: "1", memory: 2Gi }

# Escala MÉDIA de produção (10–100M linhas, ~3–5 jobs DQ/profiling simultâneos).
# Total: 3 workers × 4 cores / 8G = 12 cores / 24G ofertados ao Spark.
# Com spark.cores.max=4 por job (no backend), ~3 jobs coexistem.
worker:
  replicas: 3
  cores: 4
  memory: 8G            # memória que o worker oferta ao Spark (SPARK_WORKER_MEMORY)
  webUiPort: 8081
  resources:
    requests: { cpu: "2", memory: 6Gi }
    limits: { cpu: "4", memory: 10Gi }   # folga p/ overhead da JVM + /tmp acima do SPARK_WORKER_MEMORY
  hpa:
    enabled: false       # workers standalone: escalar com cuidado (registram no master)
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

# Scratch efêmero por pod (spark.local.dir). Profiling pode fazer spill — folga na escala média.
scratch:
  sizeLimit: 20Gi

podDisruptionBudget:
  minAvailable: 1

# ConfigMap: overrides de spark-defaults e envs não-secretas.
config:
  SPARK_WORKER_CORES: "4"
  SPARK_WORKER_MEMORY: "8G"

# Isolamento de rede: só o backend (driver) e os próprios pods Spark alcançam master/worker.
networkPolicy:
  enabled: true
  backendPodLabels:
    app.kubernetes.io/name: t2c-data-backend

# Autenticação RPC do Spark (defesa em profundidade). Ligue APÓS pôr SPARK_AUTH_SECRET no
# secret-values.yaml (mesmo valor deve ir no Secret do t2c-data-backend, env SPARK_AUTH_SECRET).
spark:
  authEnabled: false

# Secret: credenciais AWS p/ S3 (via secret-values.yaml em runtime — NUNCA versionar valores).
secrets:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: ""
  SPARK_AUTH_SECRET: ""
