apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.appName }}-secrets
  labels:
{{ include "spark.labels" . | indent 4 }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
# Valores reais via `-f secret-values.yaml` gerado em runtime no deploy (GitHub Secrets).
