apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}-master
  labels:
{{ include "spark.labels" . | indent 4 }}
    app.kubernetes.io/component: master
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}
      app.kubernetes.io/component: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}
        app.kubernetes.io/component: master
    spec:
      serviceAccountName: {{ .Values.appName }}
      securityContext:
{{ include "spark.securityContext" . | indent 8 }}
      containers:
        - name: master
          image: {{ include "spark.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/opt/spark/bin/spark-class"]
          args:
            - "org.apache.spark.deploy.master.Master"
            - "--host"
            - "$(POD_IP)"
            - "--port"
            - "{{ .Values.master.rpcPort }}"
            - "--webui-port"
            - "{{ .Values.master.webUiPort }}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SPARK_LOG_DIR
              value: /tmp/spark-logs
{{- if .Values.spark.authEnabled }}
            - name: SPARK_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-secrets
                  key: SPARK_AUTH_SECRET
            - name: SPARK_DAEMON_JAVA_OPTS
              value: "-Dspark.authenticate=true -Dspark.authenticate.secret=$(SPARK_AUTH_SECRET)"
{{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.appName }}-config
            - secretRef:
                name: {{ .Values.appName }}-secrets
          ports:
            - { name: rpc, containerPort: {{ .Values.master.rpcPort }} }
            - { name: webui, containerPort: {{ .Values.master.webUiPort }} }
          startupProbe:
            tcpSocket: { port: rpc }
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: rpc }
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /, port: webui }
            periodSeconds: 10
            failureThreshold: 3
          resources:
{{ toYaml .Values.master.resources | indent 12 }}
          securityContext:
{{ include "spark.containerSecurityContext" . | indent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
