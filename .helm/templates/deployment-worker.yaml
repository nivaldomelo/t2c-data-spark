apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}-worker
  labels:
{{ include "spark.labels" . | indent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.hpa.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ .Values.appName }}
      securityContext:
{{ include "spark.securityContext" . | indent 8 }}
      containers:
        - name: worker
          image: {{ include "spark.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/opt/spark/bin/spark-class"]
          args:
            - "org.apache.spark.deploy.worker.Worker"
            - "spark://{{ .Values.appName }}-master:{{ .Values.master.rpcPort }}"
            - "--host"
            - "$(POD_IP)"
            - "--cores"
            - "{{ .Values.worker.cores }}"
            - "--memory"
            - "{{ .Values.worker.memory }}"
            - "--webui-port"
            - "{{ .Values.worker.webUiPort }}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SPARK_LOG_DIR
              value: /tmp/spark-logs
            - name: SPARK_WORKER_DIR
              value: /tmp/spark-work
          envFrom:
            - configMapRef:
                name: {{ .Values.appName }}-config
            - secretRef:
                name: {{ .Values.appName }}-secrets
          ports:
            - { name: webui, containerPort: {{ .Values.worker.webUiPort }} }
          startupProbe:
            tcpSocket: { port: webui }
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: webui }
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /, port: webui }
            periodSeconds: 10
            failureThreshold: 3
          resources:
{{ toYaml .Values.worker.resources | indent 12 }}
          securityContext:
{{ include "spark.containerSecurityContext" . | indent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.scratch.sizeLimit }}
