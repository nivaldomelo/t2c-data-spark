# Defaults do cluster Spark do t2c_data. Ajustes por ambiente via ConfigMap/--set no chart.

# Scratch local (emptyDir montado em /tmp/spark-local)
spark.local.dir                     /tmp/spark-local

# Acesso a S3/Data Lake (credenciais via env AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY do Secret)
spark.hadoop.fs.s3a.impl            org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider  com.amazonaws.auth.EnvironmentVariableCredentialsProvider
spark.hadoop.fs.s3a.path.style.access         false

# Histórico de execuções (opcional). Aponte para S3 em produção, ex.:
#   spark.eventLog.dir  s3a://<bucket>/spark-events
spark.eventLog.enabled              false
spark.eventLog.dir                  /tmp/spark-events
